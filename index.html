<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taxi Tam Kỳ - Xe Quay Đầu Đà Nẵng</title>

<meta name="description" content="Taxi Tam Kỳ đi Đà Nẵng giá rẻ, gọi 0904000047 có xe ngay">

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    background: 
    linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
    url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* HEADER */
.header {
    padding: 20px;
    border-bottom: 2px solid gold;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
}

.call {
    background: gold;
    color: black;
    animation: rung 0.7s infinite;
}

.zalo {
    background: #0084ff;
}

/* RUNG */
@keyframes rung {
    0% {transform: rotate(0);}
    25% {transform: rotate(5deg);}
    50% {transform: rotate(-5deg);}
    75% {transform: rotate(5deg);}
    100% {transform: rotate(0);}
}

/* FORM */
.form {
    margin: 20px auto;
    width: 90%;
    max-width: 400px;
    background: rgba(0,0,0,0.6);
    padding: 15px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 5px;
    border-radius: 5px;
    border: none;
}

/* PRICE */
.price {
    margin: 20px auto;
    width: 90%;
    max-width: 500px;
    border: 2px solid gold;
    border-radius: 12px;
    overflow: hidden;
    background: rgba(0,0,0,0.6);
}

/* FLOAT */
.float {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.float a {
    display: block;
    margin-top: 10px;
    padding: 16px;
    border-radius: 50%;
    font-size: 20px;
}

.float-call {
    background: red;
    animation: rung 0.8s infinite;
}

/* POPUP */
.popup {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: gold;
    color: black;
    padding: 15px;
    display: none;
}
</style>
</head>

<body>

<div class="header">
    <h1>🚖 TAXI TAM KỲ - QUẢNG NAM</h1>
    <p>Xe Quay Đầu Tam Kỳ ⇆ Đà Nẵng</p>
</div>

<h2>📞 Gọi là có xe sau 5 phút</h2>

<a href="tel:0904000047" class="btn call">📞 Gọi ngay</a>
<a href="https://zalo.me/0904000047" class="btn zalo">💬 Zalo</a>

<!-- FORM -->
<div class="form">
    <h3>📩 Đặt xe nhanh</h3>
    <input type="text" id="name" placeholder="Tên của bạn">
    <input type="text" id="phone" placeholder="Số điện thoại">
    <button class="btn call" onclick="sendZalo()">Gửi đặt xe</button>
</div>

<!-- BẢNG GIÁ -->
<div class="price">
    <div>25km: 300K</div>
    <div>30km: 350K</div>
    <div>35km: 400K</div>
    <div>40km: 450K</div>
    <div>45km: 500K</div>
    <div>50km: 550K</div>
    <div>60km: 600K</div>
</div>

<!-- MAP -->
<div style="margin:20px">
<iframe src="https://maps.google.com/maps?q=Tam%20Ky&t=&z=13&ie=UTF8&iwloc=&output=embed" width="90%" height="250"></iframe>
</div>

<!-- FLOAT -->
<div class="float">
    <a href="tel:0904000047" class="float-call">📞</a>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
🔥 Giảm 50K hôm nay - Gọi ngay!
</div>

<script>
function sendZalo(){
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var text = "Đặt xe: " + name + " - " + phone;
    window.open("https://zalo.me/0904000047?text=" + encodeURIComponent(text));
}

setTimeout(function(){
    document.getElementById("popup").style.display = "block";
}, 4000);
</script>

</body>
</html>
